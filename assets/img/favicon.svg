<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="iPhone Uno Palermo">
  <!-- Fondo Bone (transparente cuando se usa como favicon — el navegador lo respeta) -->
  <rect width="100" height="100" fill="#F5F1E8"/>

  <!-- Contenedor app icon: rounded square outline -->
  <rect x="14" y="8" width="72" height="84" rx="16" ry="16"
        fill="none" stroke="#0E0E0E" stroke-width="6"/>

  <!-- iPhone interior (filled Ink) -->
  <rect x="29" y="23" width="42" height="54" rx="6" ry="6" fill="#0E0E0E"/>

  <!-- Módulo de cámara (recorte Bone sobre el iPhone) -->
  <rect x="33" y="27" width="16" height="16" rx="3" ry="3" fill="#F5F1E8"/>

  <!-- Tres lentes -->
  <circle cx="38" cy="32" r="2.2" fill="#0E0E0E"/>
  <circle cx="44" cy="32" r="2.2" fill="#0E0E0E"/>
  <circle cx="38" cy="38" r="2.2" fill="#0E0E0E"/>
</svg>
